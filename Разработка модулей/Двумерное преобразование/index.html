<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Двумерные преобразования в CSS</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #08243a;
        background: #f1f8ff;
      }

      .scene {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        border: 1px solid #f0f;
        background-image: linear-gradient(to bottom, #0793f9 0%, #95c6ff 350px, #05b548 350px, #05b548 360px, #795636 360px, #3f2d1c 100%);
      }

      .label {
        position: absolute;
        z-index: 100;
        top: 16px;
        left: 16px;
        margin: 0;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
      }

      .wizard, .tree {
        position: absolute;
        transform-origin: bottom center;
      }

      .wizard {
        z-index: 10;
        width: 96px;
        height: 106px;
        background: url('./img/wizard.png') 0 0 no-repeat;
      }

      .tree {
        z-index: 8;
        width: 225px;
        height: 252px;
        background: url('./img/tree-large.png') 0 0 no-repeat;
      }

      /* Задание 1: translateX(250px) */
      .wizard-move-x {
        top: 244px;
        left: 30px;
        transform: translateX(250px);
      }

      /* Задание 2: levitate c цепочкой translateY/translateX/translateY */
      .wizard.levitate {
        top: 244px;
        left: 210px;
        transform: translateY(-200px) translateX(280px) translateY(200px);
      }

      /* Задание 3: scale */
      .tree.small-tree {
        top: 178px;
        left: 620px;
        transform: scale(0.25);
      }

      .wizard.giant {
        top: 220px;
        left: 740px;
        transform: scale(3);
      }

      /* Задание 4: подъем + поворот мага в воздухе */
      .wizard.rotated-flight {
        top: 280px;
        left: 980px;
        transform: translateY(-200px) rotate(45deg);
      }

      /* Задание 5: наклон по X на 30 градусов */
      .wizard.skewed {
        top: 244px;
        left: 1160px;
        transform: skewX(30deg);
      }

      /* Задание 6: собственный элемент с 2+ трансформациями */
      .any-element {
        position: absolute;
        top: 110px;
        left: 1340px;
        width: 120px;
        height: 120px;
        background: url('./img/field-maple-summer-leaf-clipart-md.png') center / contain no-repeat;
        transform: translateX(40px) rotate(35deg) scale(1.15);
      }
    </style>
  </head>
  <body>
    <section class="scene">
      <h1 class="label">Демонстрация всех заданий по 2D-трансформациям</h1>

      <div class="wizard wizard-move-x"></div>
      <div class="wizard levitate"></div>
      <div class="tree small-tree"></div>
      <div class="wizard giant"></div>
      <div class="wizard rotated-flight"></div>
      <div class="wizard skewed"></div>
      <div class="any-element" aria-label="Собственный элемент с несколькими трансформациями"></div>
    </section>
  </body>
</html>
