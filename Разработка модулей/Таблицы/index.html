<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблицы</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main>
    <table>
      <caption>Успеваемость по предметам</caption>
      <thead>
        <tr><th>Предмет</th><th>Оценка</th><th>Преподаватель</th></tr>
      </thead>
      <tbody>
        <tr><td>HTML</td><td>5</td><td>Иванова Е.А.</td></tr>
        <tr><td>CSS</td><td>5</td><td>Петров Д.С.</td></tr>
        <tr><td>Алгоритмы</td><td>4</td><td>Смирнов М.И.</td></tr>
      </tbody>
      <tfoot>
        <tr><td colspan="3">Итог: 2 отличные, 1 хорошая оценка</td></tr>
      </tfoot>
    </table>
  </main>
</body>
</html>
