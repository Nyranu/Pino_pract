<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Фоновые изображения и градиенты</title>
    <style>
      html, body { margin: 0; height: 100%; }

      .world {
        position: relative;
        min-width: 640px;
        height: 100%;
        overflow: hidden;
        border: 1px solid #f0f;
        background:
          linear-gradient(to bottom, #6dc7ff 0%, #bfe8ff 42%, #6ecf69 42%, #56b355 58%, #8b5a3a 58%, #3f2d1c 100%);
      }

      .wizard {
        position: absolute;
        z-index: 10;
        top: 244px;
        left: 30px;
        width: 96px;
        height: 106px;
        background: url('./img/wizard.png') 0 0 no-repeat;
      }

      .tree {
        position: absolute;
        z-index: 8;
        top: 178px;
        left: 400px;
        width: 225px;
        height: 252px;
        background: url('./img/tree-large.png') 0 0 no-repeat;
      }

      .leaves {
        position: absolute;
        z-index: 9;
        top: 178px;
        left: 400px;
        width: 165px;
        height: 70px;
        background-image: url('./img/leaf.png');
        background-repeat: repeat-x;
        background-size: 42px auto;
        background-position: 0 0;
      }

      .sun {
        width: 80px;
        height: 80px;
        background: radial-gradient(circle, #ffeb3b, #ff9800);
        border-radius: 50%;
        position: absolute;
        top: 50px;
        left: 50px;
        box-shadow: 0 0 50px #ffeb3b, 0 0 100px #ff9800;
      }

      .cloud {
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50px;
      }

      .cloud::before,
      .cloud::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
      }

      .cloud-1 {
        top: 65px;
        left: 220px;
        width: 150px;
        height: 45px;
      }

      .cloud-1::before {
        width: 60px;
        height: 60px;
        left: 18px;
        top: -28px;
      }

      .cloud-1::after {
        width: 70px;
        height: 70px;
        right: 18px;
        top: -35px;
      }

      .cloud-2 {
        top: 115px;
        right: 150px;
        width: 175px;
        height: 52px;
      }

      .cloud-2::before {
        width: 75px;
        height: 75px;
        left: 16px;
        top: -38px;
      }

      .cloud-2::after {
        width: 60px;
        height: 60px;
        right: 24px;
        top: -30px;
      }
    </style>
  </head>
  <body>
    <div class="world">
      <div class="sun"></div>
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="wizard"></div>
      <div class="tree"></div>
      <div class="leaves"></div>
    </div>
  </body>
</html>
